[pytest]
# Pytest 配置文件

# 测试路径
testpaths = .

# Python 文件模式
python_files = test_*.py

# Python 类模式
python_classes = Test*

# Python 函数模式
python_functions = test_*

# 最小 Python 版本
minversion = 6.0

# 添加选项
addopts =
    # 显示详细输出
    -v
    # 显示测试摘要
    -ra
    # 显示本地变量
    --tb=short
    # 严格标记
    --strict-markers
    # 警告设置
    -W ignore::DeprecationWarning

# 标记定义
markers =
    unit: 单元测试（不需要外部依赖）
    integration: 集成测试（需要多个组件）
    api: API 测试（需要服务器运行）
    slow: 慢速测试
    config: 配置相关测试
    validator: 验证器相关测试

# 异步测试模式
asyncio_mode = auto

# 日志设置
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率设置
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
